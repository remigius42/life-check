[tool.black]
line-length = 88
target-version = ["py311"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]  # pycodestyle, pyflakes, isort

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "standard"
# RPi.GPIO is hardware-only and not installed on dev machines
reportMissingModuleSource = "none"
