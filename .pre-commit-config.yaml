# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
        args: [--unsafe]  # Allow custom YAML tags used by Ansible
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        stages: [pre-commit]
        # currently, all content in .claude, .gemini and .opencode is vendored
        # openspec contains files which are sensitive to formatting, eg. keywords
        # must appear on the first lines of requirements.
        exclude: ^(\.(claude|gemini|opencode)|openspec)/
        additional_dependencies:
          - mdformat-gfm

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        stages: [pre-commit]

  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v9.6.0
    hooks:
      - id: cspell
        stages: [pre-commit]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        stages: [pre-commit]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-github-workflows
        stages: [pre-commit]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        stages: [pre-commit]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - "@commitlint/config-conventional"

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.1.1
    hooks:
      - id: ansible-lint
        stages: [pre-commit]
        files: \.(yaml|yml)$
        exclude: ^esphome/
        additional_dependencies:
          - ansible-core>=2.20

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        stages: [pre-commit]
        files: \.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        stages: [pre-commit]
        files: \.py$
        args: [--fix]

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
        stages: [pre-commit]
        files: \.py$

  - repo: local
    hooks:
      - id: openspec-validate
        name: openspec validate
        entry: npx --yes @fission-ai/openspec validate --no-interactive --strict --all
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: detector-unit-tests
        name: Detector unit tests
        entry: python3 -m unittest discover -s roles/detector/files/tests
        language: system
        pass_filenames: false
        files: ^roles/detector/files/.*\.py$
        stages: [pre-commit]

      - id: esphome-config-validate
        name: ESPHome config validate
        entry: bash -c 'cp -n esphome/secrets.yaml.example esphome/secrets.yaml && esphome config esphome/life-check.yaml'
        language: system
        pass_filenames: false
        files: ^esphome/
        stages: [pre-commit]
