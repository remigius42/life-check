---
- name: Verify all hosts
  hosts: all
  vars_files:
    - ../group_vars/all/vars.yml
  tasks:
    - name: Assert locales package is installed
      ansible.builtin.package_facts:
        manager: auto

    - name: Fail if locales package is missing
      ansible.builtin.assert:
        that: "'locales' in ansible_facts.packages"
        fail_msg: "locales package is not installed"

    - name: Read /etc/locale.gen
      ansible.builtin.slurp:
        src: /etc/locale.gen
      register: _locale_gen

    - name: Assert de_CH.UTF-8 is enabled in locale.gen
      ansible.builtin.assert:
        that: "(_locale_gen.content | b64decode) is search('^de_CH\\.UTF-8 UTF-8', multiline=True)"
        fail_msg: "de_CH.UTF-8 UTF-8 not enabled in /etc/locale.gen"

    - name: Assert en_US.UTF-8 is enabled in locale.gen
      ansible.builtin.assert:
        that: "(_locale_gen.content | b64decode) is search('^en_US\\.UTF-8 UTF-8', multiline=True)"
        fail_msg: "en_US.UTF-8 UTF-8 not enabled in /etc/locale.gen"

    - name: Get current timezone
      ansible.builtin.command:
        cmd: timedatectl show --property=Timezone --value
      changed_when: false
      register: _current_tz

    - name: Assert timezone is correct
      ansible.builtin.assert:
        that: "_current_tz.stdout.strip() == locales_timezone"
        fail_msg: "Timezone is {{ _current_tz.stdout.strip() }}, expected {{ locales_timezone }}"

    - name: Read /etc/ssh/sshd_config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config
      register: _sshd_config

    - name: Assert PermitRootLogin no is set
      ansible.builtin.assert:
        that: "(_sshd_config.content | b64decode) is search('^PermitRootLogin no', multiline=True)"
        fail_msg: "PermitRootLogin no not found in /etc/ssh/sshd_config"

    - name: Assert PubkeyAuthentication yes is set
      ansible.builtin.assert:
        that: "(_sshd_config.content | b64decode) is search('^PubkeyAuthentication yes', multiline=True)"
        fail_msg: "PubkeyAuthentication yes not found in /etc/ssh/sshd_config"

    - name: Assert PasswordAuthentication no is set (ssh_manage_keys true)
      ansible.builtin.assert:
        that: "(_sshd_config.content | b64decode) is search('^PasswordAuthentication no', multiline=True)"
        fail_msg: "PasswordAuthentication no not found in /etc/ssh/sshd_config"
      when: ssh_manage_keys

    - name: Assert PasswordAuthentication no is absent (ssh_manage_keys false)
      ansible.builtin.assert:
        that: "(_sshd_config.content | b64decode) is not search('^PasswordAuthentication no', multiline=True)"
        fail_msg: "PasswordAuthentication no unexpectedly found in /etc/ssh/sshd_config"
      when: not ssh_manage_keys

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert sshd is running
      ansible.builtin.assert:
        that: "ansible_facts.services[ssh_service_name + '.service'] is defined and ansible_facts.services[ssh_service_name + '.service'].state == 'running'"
        fail_msg: "sshd service ({{ ssh_service_name }}) is not running"

    - name: Check ufw status
      ansible.builtin.command:
        cmd: ufw status
      changed_when: false
      become: true
      register: _ufw_status

    - name: Assert ufw is active
      ansible.builtin.assert:
        that: "_ufw_status.stdout is search('Status: active')"
        fail_msg: "UFW is not active"

    - name: Assert fail2ban is running and enabled
      ansible.builtin.assert:
        that:
          - "ansible_facts.services['fail2ban.service'] is defined"
          - "ansible_facts.services['fail2ban.service'].state == 'running'"
          - "ansible_facts.services['fail2ban.service'].status == 'enabled'"
        fail_msg: "fail2ban service is not running or not enabled"

    - name: Assert sshd jail drop-in exists
      ansible.builtin.stat:
        path: /etc/fail2ban/jail.d/sshd.conf
      register: _fail2ban_sshd_jail
      become: true

    - name: Fail if sshd jail drop-in is missing
      ansible.builtin.assert:
        that: "_fail2ban_sshd_jail.stat.exists"
        fail_msg: "/etc/fail2ban/jail.d/sshd.conf does not exist"

    - name: Assert slack-notify.conf exists when webhook URL is set
      ansible.builtin.stat:
        path: /etc/fail2ban/action.d/slack-notify.conf
      register: _fail2ban_slack_action
      become: true
      when: vault_fail2ban_slack_webhook_url is defined and vault_fail2ban_slack_webhook_url | length > 0

    - name: Fail if slack-notify.conf is missing when webhook URL is set
      ansible.builtin.assert:
        that: "_fail2ban_slack_action.stat.exists"
        fail_msg: "/etc/fail2ban/action.d/slack-notify.conf does not exist but vault_fail2ban_slack_webhook_url is set"
      when: vault_fail2ban_slack_webhook_url is defined and vault_fail2ban_slack_webhook_url | length > 0

    - name: Assert slack-notify.conf is absent when webhook URL is unset
      ansible.builtin.stat:
        path: /etc/fail2ban/action.d/slack-notify.conf
      register: _fail2ban_slack_action_absent
      become: true
      when: vault_fail2ban_slack_webhook_url is not defined or vault_fail2ban_slack_webhook_url | length == 0

    - name: Fail if slack-notify.conf exists when webhook URL is unset
      ansible.builtin.assert:
        that: "not _fail2ban_slack_action_absent.stat.exists"
        fail_msg: "/etc/fail2ban/action.d/slack-notify.conf exists but vault_fail2ban_slack_webhook_url is not set"
      when: vault_fail2ban_slack_webhook_url is not defined or vault_fail2ban_slack_webhook_url | length == 0
