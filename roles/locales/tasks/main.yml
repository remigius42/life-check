---
- name: Ensure locales package is installed
  become: true
  ansible.builtin.package:
    name: locales
    state: present

- name: Enable locales in /etc/locale.gen
  become: true
  ansible.builtin.lineinfile:
    path: "{{ locales_locale_gen_path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.string }}"
    state: present
    backup: true
  loop: "{{ locales_locales }}"
  notify: "regenerate locales"

- name: Get current timezone
  ansible.builtin.command:
    cmd: timedatectl show --property=Timezone --value
  changed_when: false
  register: _locales_current_tz

- name: Set system timezone
  become: true
  ansible.builtin.command:
    cmd: timedatectl set-timezone {{ locales_timezone }}
  when: _locales_current_tz.stdout.strip() != locales_timezone
  changed_when: true
