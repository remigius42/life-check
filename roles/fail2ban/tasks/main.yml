---
# tasks file for roles/fail2ban

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  become: true

- name: Deploy sshd jail drop-in
  ansible.builtin.template:
    src: jail.d/sshd.conf.j2
    dest: /etc/fail2ban/jail.d/sshd.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart fail2ban

- name: Deploy Slack action file
  ansible.builtin.template:
    src: action.d/slack-notify.conf.j2
    dest: /etc/fail2ban/action.d/slack-notify.conf
    owner: root
    group: root
    mode: "0600"
  become: true
  when: vault_fail2ban_slack_webhook_url is defined and vault_fail2ban_slack_webhook_url | length > 0
  notify: Restart fail2ban

- name: Remove Slack action file when disabled
  ansible.builtin.file:
    path: /etc/fail2ban/action.d/slack-notify.conf
    state: absent
  become: true
  when: vault_fail2ban_slack_webhook_url is not defined or vault_fail2ban_slack_webhook_url | length == 0
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
  become: true
