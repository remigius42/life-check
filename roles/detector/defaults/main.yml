# SPDX-License-Identifier: MIT
---
detector_gpio_pin: 17
detector_poll_interval_ms: 50
detector_gpio_init_retries: 3
detector_history_retention_days: 14
detector_test_mode_grace_period_s: 1800
detector_install_dir: /opt/beam_detector
detector_config_dir: /etc/beam_detector
detector_data_dir: /var/lib/beam_detector
detector_run_dir: /run/beam_detector
detector_counts_path: "{{ detector_data_dir }}/counts.json"
detector_state_path: "{{ detector_run_dir }}/state.json"
detector_test_mode_sentinel: "{{ detector_run_dir }}/test_mode"
detector_reset_sentinel_path: "{{ detector_run_dir }}/reset_count"
detector_service_user: root  # Stock Raspberry Pi OS pre Debian Bookwork requires root for GPIO
detector_group: detector
detector_report_user: beam-detector-report
detector_report_webhook_url: ""
detector_report_time: "17:00"
detector_report_threshold: 2
# {count} is available as an opt-in token in all three msg_* vars; omitted from defaults for privacy
detector_report_msg_ok: "Beam breaks today: ✅ OK (equal or above threshold)"
detector_report_msg_low: "Beam breaks today: 🚨 under threshold"
detector_report_msg_zero: "Beam breaks today: 0 ⚠️ no breaks today, sensor might be down."
# HA privacy window: sensor returns not_ok from detector_report_time (or midnight, whichever is earlier) until this time.
detector_ha_privacy_window_end: "08:00"
# HA jitter: additional seconds added to the 900 s base delay on daytime threshold-crossing transitions.
# Intentionally not a HA-configurable entity — changing it requires a service restart.
detector_ha_jitter_max_add_s: 2700
detector_web_port: 8080
detector_web_user: "beam-detector-web"
detector_pico_version: "2.1.1"
# ufw_lan_subnet is required from group_vars/all/vars.yml and is not defined in this role
