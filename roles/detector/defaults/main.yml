# SPDX-License-Identifier: MIT
---
detector_gpio_pin: 17
detector_poll_interval_ms: 50
detector_gpio_init_retries: 3
detector_history_retention_days: 14
detector_test_mode_grace_period_s: 1800
detector_install_dir: /opt/beam_detector
detector_config_dir: /etc/beam_detector
detector_data_dir: /var/lib/beam_detector
detector_run_dir: /run/beam_detector
detector_counts_path: "{{ detector_data_dir }}/counts.json"
detector_state_path: "{{ detector_run_dir }}/state.json"
detector_test_mode_sentinel: "{{ detector_run_dir }}/test_mode"
detector_service_user: root  # Stock Raspberry Pi OS pre Debian Bookwork requires root for GPIO
detector_group: detector
detector_report_user: beam-detector-report
