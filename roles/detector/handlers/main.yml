# SPDX-License-Identifier: MIT
---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Restart beam-detector
  ansible.builtin.systemd:
    name: beam-detector
    state: restarted
  become: true

- name: Restart beam-detector-report.timer
  ansible.builtin.systemd:
    name: beam-detector-report.timer
    state: restarted
  become: true

- name: Restart beam-detector-web
  ansible.builtin.systemd:
    name: beam-detector-web
    state: restarted
  become: true
